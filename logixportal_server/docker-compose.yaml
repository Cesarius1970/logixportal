services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: logixportal
      POSTGRES_PASSWORD: "tudIDkgYRNo_su1xTK2A432zEb4SRf1Q"
    volumes:
      - logixportal_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "MX9bQ5_OQ7RzKzu0I8wO9DVowFVKUc0x"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: logixportal_test
      POSTGRES_PASSWORD: "meLFZdRMY3HudE4oDWx0MWSGhHV5Y-Od"
    volumes:
      - logixportal_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "ac6tlvS7AKyOL2v9fZ2hJu8VQc0ZPXPl"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  logixportal_data:
  logixportal_test_data:
